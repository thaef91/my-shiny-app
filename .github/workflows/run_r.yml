name: Execute R Script

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις και χειροκίνητα με ένα κουμπί

jobs:
  run-r-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Run my script
        run: Rscript script.R
